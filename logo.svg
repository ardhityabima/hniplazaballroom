<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96b"/>
      <stop offset="40%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7a30"/>
    </linearGradient>
  </defs>

  <!-- H left vertical bar with serifs -->
  <rect x="108" y="55" width="18" height="105" fill="url(#g)" rx="1"/>
  <!-- H left top serif -->
  <rect x="100" y="55" width="34" height="5" fill="url(#g)" rx="1"/>
  <!-- H left bottom serif -->
  <rect x="100" y="155" width="34" height="5" fill="url(#g)" rx="1"/>

  <!-- H crossbar -->
  <rect x="108" y="102" width="76" height="12" fill="url(#g)"/>

  <!-- H/P shared vertical bar -->
  <rect x="166" y="55" width="18" height="105" fill="url(#g)" rx="1"/>
  <!-- Shared bar top serif -->
  <rect x="158" y="55" width="34" height="5" fill="url(#g)" rx="1"/>
  <!-- H right bottom serif -->
  <rect x="158" y="155" width="34" height="5" fill="url(#g)" rx="1"/>

  <!-- P bowl - outer -->
  <path d="M184 58 Q230 58 238 78 Q246 98 238 118 Q230 138 184 138 Z" fill="url(#g)"/>
  <!-- P bowl - inner cutout -->
  <path d="M184 70 Q220 70 228 82 Q234 94 228 112 Q220 126 184 126 Z" fill="#0a0a0a"/>

  <!-- Building silhouette inside H (between verticals, below crossbar) -->
  <!-- Tower body -->
  <rect x="134" y="126" width="10" height="30" fill="#0a0a0a"/>
  <!-- Tower peak -->
  <polygon points="139,114 134,126 144,126" fill="#0a0a0a"/>
  <!-- Tower door -->
  <rect x="136" y="144" width="6" height="12" fill="url(#g)" opacity="0.3"/>
  <!-- Tower window -->
  <rect x="136" y="130" width="6" height="6" fill="url(#g)" opacity="0.25"/>

  <!-- Decorative thin horizontal rules flanking monogram -->
  <line x1="48" y1="108" x2="96" y2="108" stroke="url(#g)" stroke-width="1"/>
  <line x1="255" y1="108" x2="308" y2="108" stroke="url(#g)" stroke-width="1"/>

  <!-- Small diamond accents at rule ends -->
  <polygon points="48,108 51,105 54,108 51,111" fill="#c9a84c" opacity="0.7"/>
  <polygon points="308,108 305,105 302,108 305,111" fill="#c9a84c" opacity="0.7"/>

  <!-- HNÍ PLAZA wordmark -->
  <text
    x="190"
    y="228"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    letter-spacing="14"
    text-anchor="middle"
    fill="url(#g)">HNI PLAZA</text>

  <!-- Accent dot on I (positioned over the I in HNI) -->
  <circle cx="211" cy="189" r="3.5" fill="#c9a84c"/>

  <!-- Thin underline below wordmark -->
  <line x1="95" y1="238" x2="285" y2="238" stroke="url(#g)" stroke-width="0.75" opacity="0.6"/>
</svg>
